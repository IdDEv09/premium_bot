<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniApp To‘lov</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 30px; }
    button { padding: 15px 25px; margin: 10px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Mahsulotni qayerga olishni xohlaysiz?</h2>
  <div>
    <button id="toSelf">O'zimga</button>
    <button id="toOther">Boshqasiga</button>
    <button id="back">🔙 Orqaga</button>
  </div>

  <script>
    // URL dan order_id ni olish
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get("order_id");

    // Tugmalarni olish
    const toSelfBtn = document.getElementById("toSelf");
    const toOtherBtn = document.getElementById("toOther");
    const backBtn = document.getElementById("back");

    // Tugma bosilganda bot backendga fetch qiladi
    toSelfBtn.onclick = async () => {
      await fetch(/api/payme/confirm_order, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ order_id: orderId, type: "to_self" })
      });
      alert("✅ Buyurtma sizga tayyorlandi!");
    };

    toOtherBtn.onclick = async () => {
      const username = prompt("Iltimos, foydalanuvchi @username kiriting:");
      if (!username) return;
      await fetch(/api/payme/confirm_order, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ order_id: orderId, type: "to_other", username })
      });
      alert(✅ Buyurtma @${username} uchun tayyorlandi!);
    };

    backBtn.onclick = () => {
      window.history.back();
    };
  </script>
</body>
</html>
